<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riftbound Decks</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-foil2" />
  </head>
  <body class="page-decks">
    <header class="site-header">
      <a class="site-brand" href="/">Riftbound.win</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/cards/">Cards</a>
        <a class="active" href="/decks/">Decks</a>
        <a href="/community/">Community</a>
      </nav>
      <div class="site-actions" data-auth-shell></div>
    </header>

    <main class="deck-workspace">
      <section class="deck-board" aria-label="Deck list">
        <div class="page-head compact">
          <div>
            <p class="eyebrow">Deck Lab</p>
            <h1>Decks</h1>
          </div>
          <p id="deckSummary">Loading cards...</p>
        </div>

        <div id="deckStats" class="deck-stats"></div>
        <div id="validationMessages" class="deck-validation" aria-live="polite"></div>
        <div id="deckSections" class="deck-sections"></div>

        <div class="deck-tools">
          <div class="deck-io">
            <label>
              Import
              <textarea id="importText" rows="6" spellcheck="false" placeholder="3x OGN-111&#10;2x OGN-001&#10;12x OGN-042"></textarea>
            </label>
            <button id="importDeck" type="button">Import</button>
            <div id="importWarnings" class="warnings" aria-live="polite"></div>
          </div>

          <div class="deck-io">
            <label>
              Export
              <textarea id="exportText" rows="6" spellcheck="false" readonly></textarea>
            </label>
            <button id="exportDeck" type="button">Export</button>
            <button id="clearDeck" class="ghost-button" type="button">Clear</button>
          </div>

          <div class="draw-panel">
            <div class="draw-actions">
              <h2>Test Draw</h2>
              <button id="drawTest" type="button">Draw</button>
            </div>
            <div id="drawOutput" class="draw-output"></div>
          </div>
        </div>
      </section>

      <section class="deck-browser" aria-label="Card picker">
        <div class="deck-filters">
          <input id="deckSearch" type="search" placeholder="Search card name, ID, text" autocomplete="off" />
          <select id="deckColor" aria-label="Color filter"></select>
          <select id="deckType" aria-label="Type filter"></select>
        </div>

        <div id="deckResults" class="deck-results" aria-live="polite"></div>
      </section>

      <aside class="card-inspector" aria-label="Card detail">
        <div id="cardPreview" class="card-preview"></div>
      </aside>
    </main>

    <script src="/decks.js" type="module"></script>
    <script src="/auth.js" type="module"></script>
    <script src="/perf.js" type="module"></script>
  </body>
</html>
