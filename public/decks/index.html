<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riftbound.kr Decks</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-foilvis1" />
  </head>
  <body class="page-decks">
    <header class="site-header">
      <a class="site-brand" href="/" data-brand>Riftbound.kr</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/cards/">Cards</a>
        <a class="active" href="/decks/">Decks</a>
        <a href="/community/">Community</a>
      </nav>
      <div class="site-actions" data-auth-shell></div>
    </header>

    <main class="deck-workspace">
      <section class="deck-board" aria-label="Deck list">
        <div class="page-head compact">
          <div>
            <p class="eyebrow">Deck Lab</p>
            <h1>Decks</h1>
          </div>
          <p id="deckSummary">Loading cards...</p>
        </div>

        <div id="deckRules" class="deck-rules" aria-label="Deck construction rules">
          <span><strong>40+</strong> main cards</span>
          <span><strong>12</strong> runes</span>
          <span><strong>1</strong> legend</span>
          <span><strong>3</strong> unique battlefields</span>
          <span><strong>3x</strong> max main copies</span>
        </div>

        <div id="deckStats" class="deck-stats"></div>
        <div id="validationMessages" class="deck-validation" aria-live="polite"></div>
        <div class="saved-deck-bar" aria-label="Saved decks">
          <label>
            Name
            <input id="deckName" type="text" maxlength="80" placeholder="Deck name" />
          </label>
          <button id="saveDeck" type="button">Save</button>
          <select id="savedDecks" aria-label="Saved deck list"></select>
          <button id="loadSavedDeck" type="button">Load</button>
          <button id="refreshSavedDecks" class="ghost-button" type="button">Refresh</button>
          <span id="savedDeckStatus" class="saved-deck-status" aria-live="polite"></span>
        </div>
        <div id="deckListTop" class="deck-list-top" aria-label="Deck cards and runes">
          <section class="deck-list-group" data-deck-group="cards">
            <div class="deck-list-group-head">
              <h2>Cards</h2>
              <span id="cardDeckCount">0 / 44+</span>
            </div>
            <div id="cardDeckList" class="deck-list-compact"></div>
          </section>
          <section class="deck-list-group" data-deck-group="runes">
            <div class="deck-list-group-head">
              <h2>Runes</h2>
              <span id="runeDeckCount">0 / 12</span>
            </div>
            <div id="runeDeckList" class="deck-list-compact"></div>
          </section>
        </div>
        <div id="deckSections" class="deck-sections" hidden></div>

        <div class="deck-tools">
          <div class="deck-io">
            <label>
              Import
              <textarea id="importText" rows="6" spellcheck="false" placeholder="3x OGN-111&#10;2x OGN-001&#10;12x OGN-042"></textarea>
            </label>
            <button id="importDeck" type="button">Import</button>
            <div id="importWarnings" class="warnings" aria-live="polite"></div>
          </div>

          <div class="deck-io">
            <label>
              Export
              <textarea id="exportText" rows="6" spellcheck="false" readonly></textarea>
            </label>
            <button id="exportDeck" type="button">Export</button>
            <button id="clearDeck" class="ghost-button" type="button">Clear</button>
          </div>

          <div class="draw-panel">
            <div class="draw-actions">
              <h2>Test Draw</h2>
              <button id="drawTest" type="button">Draw</button>
            </div>
            <div id="drawOutput" class="draw-output"></div>
          </div>
        </div>
      </section>

      <section class="deck-browser" aria-label="Card picker">
        <div class="deck-filters">
          <input id="deckSearch" type="search" placeholder="Search card name, ID, text" autocomplete="off" />
          <select id="deckColor" aria-label="Color filter"></select>
          <select id="deckType" aria-label="Type filter"></select>
        </div>

        <div id="deckResults" class="deck-results" aria-live="polite"></div>
      </section>

      <aside class="card-inspector" aria-label="Card detail">
        <div id="cardPreview" class="card-preview"></div>
      </aside>
    </main>

    <script src="/brand.js?v=20260628-domainbrand1" type="module"></script>
    <script src="/decks.js?v=20260628-runechannels1" type="module"></script>
    <script src="/auth.js?v=20260628-authlabel1" type="module"></script>
    <script src="/perf.js?v=20260628-perf2" type="module"></script>
  </body>
</html>
