<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riftbound Decks</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="page-decks">
    <header class="site-header">
      <a class="site-brand" href="/">Riftbound Vault</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/cards/">Cards</a>
        <a class="active" href="/decks/">Decks</a>
        <a href="/community/">Community</a>
      </nav>
    </header>

    <main class="deck-workspace">
      <section class="deck-browser" aria-label="Card picker">
        <div class="page-head compact">
          <div>
            <p class="eyebrow">Deck Lab</p>
            <h1>Decks</h1>
          </div>
          <p id="deckSummary">Loading cards...</p>
        </div>

        <div class="deck-filters">
          <input id="deckSearch" type="search" placeholder="Search card name, ID, text" autocomplete="off" />
          <select id="deckColor" aria-label="Color filter"></select>
          <select id="deckType" aria-label="Type filter"></select>
        </div>

        <div id="deckResults" class="deck-results" aria-live="polite"></div>
      </section>

      <aside class="deck-panel" aria-label="Current deck">
        <div class="deck-panel-head">
          <h2>Current Deck</h2>
          <button id="clearDeck" class="ghost-button" type="button">Clear</button>
        </div>

        <div id="deckStats" class="deck-stats"></div>
        <div id="deckList" class="deck-list"></div>

        <div class="deck-io">
          <label>
            Import
            <textarea id="importText" rows="7" spellcheck="false" placeholder="3x OGN-111&#10;2x OGN-001&#10;1x SFD-001"></textarea>
          </label>
          <button id="importDeck" type="button">Import</button>
          <div id="importWarnings" class="warnings" aria-live="polite"></div>
          <label>
            Export
            <textarea id="exportText" rows="7" spellcheck="false" readonly></textarea>
          </label>
          <button id="exportDeck" type="button">Export</button>
        </div>
      </aside>
    </main>

    <script src="/decks.js" type="module"></script>
  </body>
</html>
