<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riftbound.kr Playground</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-playground7" />
  </head>
  <body class="page-playground">
    <header class="site-header">
      <a class="site-brand" href="/" data-brand>Riftbound.kr</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/cards/">Cards</a>
        <a href="/decks/">Decks</a>
        <a class="active" href="/playground/">Playground</a>
        <a href="/community/">Community</a>
      </nav>
      <div class="site-actions" data-auth-shell></div>
    </header>

    <main class="playground-shell">
      <section id="playgroundLobby" class="playground-panel playground-lobby" aria-label="Playground lobby">
        <div class="page-head compact">
          <div>
            <p class="eyebrow">Playground</p>
            <h1>Tables</h1>
          </div>
          <p id="playgroundStatus">Loading profile...</p>
        </div>

        <div class="playground-toolbar">
          <label>
            Saved deck
            <select id="playgroundDecks"></select>
          </label>
          <button id="createTable" type="button">Open Table</button>
          <button id="joinTable" class="ghost-button" type="button">Join Selected</button>
        </div>

        <div id="tableList" class="table-list" aria-live="polite"></div>
      </section>

      <section id="playgroundTable" class="playground-panel playground-table" aria-label="Game table">
        <div class="table-topline">
          <div>
            <p class="eyebrow">Table</p>
            <h2 id="tableTitle">No table selected</h2>
          </div>
          <div class="table-actions">
            <button id="startGame" type="button">Start</button>
            <button id="dealOpening" type="button">Deal Opening</button>
            <button id="mulliganSelected" type="button">Mulligan Selected</button>
            <button id="shuffleMainDeck" type="button">Shuffle Deck</button>
            <button id="shuffleRuneDeck" type="button">Shuffle Runes</button>
            <button id="drawOpening" type="button">Draw 1</button>
            <button id="drawRune" type="button">Channel 2 Runes</button>
            <button id="revealCard" type="button">Reveal</button>
            <button id="moveBattlefield" type="button">Play Card</button>
            <button id="scorePoint" type="button">Score Point</button>
            <button id="concedeGame" type="button">Concede</button>
            <button id="passTurn" type="button">Pass</button>
            <label class="turn-phase-control">
              Phase
              <select id="turnPhaseSelect">
                <option value="ready">Ready</option>
                <option value="score">Score</option>
                <option value="channel">Channel</option>
                <option value="draw">Draw</option>
                <option value="main">Main</option>
                <option value="end">End</option>
              </select>
            </label>
            <button id="setTurnPhase" type="button">Set Phase</button>
          </div>
        </div>

        <div class="selected-card-tools" aria-label="Selected card actions">
          <span id="selectedCardStatus">No card selected</span>
          <label>
            Move to
            <select id="moveToZone">
              <option value="hand">Hand</option>
              <option value="base">Base</option>
              <option value="battlefield">Battlefield</option>
              <option value="battlefields">Battlefields</option>
              <option value="chain">Chain</option>
              <option value="discard">Discard</option>
              <option value="removed">Removed</option>
              <option value="revealed">Revealed</option>
              <option value="legend_zone">Legend Zone</option>
              <option value="main_deck">Main Deck</option>
              <option value="rune_deck">Rune Deck</option>
              <option value="rune_pool">Rune Pool</option>
            </select>
          </label>
          <button id="moveSelectedCard" type="button">Move Selected</button>
          <button id="flipSelectedCard" type="button">Flip</button>
          <button id="exhaustSelectedCard" type="button">Exhaust/Ready</button>
          <button id="claimBattlefield" type="button">Claim Battlefield</button>
          <button id="startShowdown" type="button">Start Showdown</button>
          <label>
            Winner
            <select id="showdownWinnerSelect"></select>
          </label>
          <button id="endShowdown" type="button">End Showdown</button>
        </div>

        <div id="tableZones" class="table-zones"></div>
        <aside id="cardHoverPreview" class="card-hover-preview" aria-live="polite"></aside>
      </section>

      <aside class="playground-panel playground-side" aria-label="Communication and log">
        <section>
          <h2>Event Log</h2>
          <div id="eventLog" class="event-log" aria-live="polite"></div>
        </section>

        <section>
          <h2>Chat</h2>
          <div id="chatLog" class="chat-log" aria-live="polite"></div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" maxlength="240" placeholder="Message" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </section>

        <section id="voicePanel">
          <h2>Voice</h2>
          <div id="voiceStatus" class="voice-status">Mic idle</div>
          <div id="remoteAudio" class="remote-audio" aria-live="polite"></div>
          <button id="toggleVoice" type="button">Enable Mic</button>
        </section>

        <section id="resultPanel">
          <h2>Result</h2>
          <select id="resultSelect">
            <option value="">Select result</option>
            <option value="host-win">Host win</option>
            <option value="guest-win">Guest win</option>
            <option value="draw">Draw</option>
          </select>
          <button id="submitResult" type="button">Record Result</button>
        </section>

        <section id="replayPanel">
          <h2>Replay</h2>
          <div class="replay-controls">
            <button id="buildReplay" type="button">Build Replay</button>
            <button id="replayPrev" type="button">Prev</button>
            <button id="replayNext" type="button">Next</button>
            <span id="replayState">No replay loaded</span>
          </div>
          <div id="replayLog" class="replay-log"></div>
        </section>
      </aside>
    </main>

    <script src="/brand.js?v=20260628-fixedbrand1" type="module"></script>
    <script src="/playground.js?v=20260628-playground20" type="module"></script>
    <script src="/auth.js?v=20260628-readiness1" type="module"></script>
    <script src="/perf.js?v=20260628-perf2" type="module"></script>
  </body>
</html>
