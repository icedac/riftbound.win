<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Riftbound.kr</title>
    <link rel="stylesheet" href="/styles.css?v=20260628-foil2" />
  </head>
  <body class="page-home">
    <header class="site-header">
      <a class="site-brand" href="/">Riftbound.kr</a>
      <nav class="site-nav" aria-label="Primary">
        <a href="/cards/">Cards</a>
        <a href="/decks/">Decks</a>
        <a href="/community/">Community</a>
      </nav>
      <div class="site-actions" data-auth-shell></div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Local archive</p>
          <h1>Riftbound.kr</h1>
          <p class="hero-kicker">카드 목록, 덱 페이지, 커뮤니티 BBS로 확장되는 Riftbound 허브.</p>
          <div class="hero-actions" aria-label="Site sections">
            <a class="primary-link" href="/cards/">Cards</a>
            <a href="/decks/">Decks</a>
            <a href="/community/">BBS</a>
          </div>
        </div>

        <div class="hero-stage" aria-label="Foil card showcase">
          <a id="heroFeaturedCard" class="hero-featured-card js-foil foil-hero foil-premium" aria-label="Featured Ahri promo"></a>
          <div id="heroCards" class="hero-cards"></div>
          <div class="hero-meter" aria-label="Catalog stats">
            <span><strong id="cardCount">...</strong> cards</span>
            <span><strong id="foilCount">...</strong> foil</span>
            <span><strong id="setCount">...</strong> sets</span>
          </div>
        </div>
      </section>

      <section class="landing-routes" aria-label="Riftbound Vault sections">
        <a href="/cards/">
          <span>Cards</span>
          <strong>전체 카드 리스트</strong>
        </a>
        <a href="/decks/">
          <span>Decks</span>
          <strong>덱 생성과 import/export</strong>
        </a>
        <a href="/community/">
          <span>BBS</span>
          <strong>free, deck, notice 보드</strong>
        </a>
      </section>
    </main>

    <script src="/landing.js" type="module"></script>
    <script src="/auth.js" type="module"></script>
    <script src="/perf.js" type="module"></script>
  </body>
</html>
